<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Markdown Editor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b27;--bg3:#1e2536;--border:#2a3349;
  --accent:#5b8dee;--accent2:#7c5cbf;--text:#e8ecf4;--text2:#8892a8;--text3:#525d75;
  --tab-h:40px;--toolbar-h:44px;
  --font-mono:'JetBrains Mono','Fira Code','Consolas',monospace;
  --font-serif:'Georgia',serif;
  --radius:6px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.toolbar{height:var(--toolbar-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:4px;flex-shrink:0;}
.toolbar-logo{font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.08em;margin-right:8px;padding-right:12px;border-right:1px solid var(--border);}
.tb-btn{height:28px;min-width:28px;padding:0 8px;border:none;background:transparent;color:var(--text2);font-family:var(--font-mono);font-size:12px;font-weight:500;cursor:pointer;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;white-space:nowrap;}
.tb-btn:hover{background:var(--bg3);color:var(--text)}
.tb-btn.active{background:var(--bg3);color:var(--accent)}
.tb-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.tb-spacer{flex:1}
.tb-status{font-size:11px;color:var(--text3)}
.tabbar{height:var(--tab-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;padding:0 8px;gap:2px;flex-shrink:0;overflow-x:auto;}
.tab{height:32px;padding:0 12px;display:flex;align-items:center;gap:6px;background:transparent;border:none;border-radius:var(--radius) var(--radius) 0 0;color:var(--text3);font-family:var(--font-mono);font-size:12px;cursor:pointer;transition:background .15s,color .15s;white-space:nowrap;}
.tab:hover{background:var(--bg3);color:var(--text2)}
.tab.active{background:var(--bg);color:var(--text);border:1px solid var(--border);border-bottom:1px solid var(--bg);margin-bottom:-1px;}
.tab-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:0;transition:opacity .15s;}
.tab.modified .tab-dot{opacity:1}
.tab-close{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:3px;color:var(--text3);font-size:15px;line-height:1;transition:background .1s,color .1s;}
.tab-close:hover{background:var(--bg3);color:var(--text)}
.tab-new{height:28px;width:28px;margin-left:4px;align-self:center;display:flex;align-items:center;justify-content:center;border:none;background:transparent;color:var(--text3);font-size:20px;cursor:pointer;border-radius:var(--radius);transition:background .1s,color .1s;}
.tab-new:hover{background:var(--bg3);color:var(--text)}
.main{flex:1;display:flex;overflow:hidden;}
.editor-pane{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:0;}
.editor-pane.hidden{flex:0;border:none;overflow:hidden}
.editor-header{height:28px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-size:11px;color:var(--text3);letter-spacing:.05em;flex-shrink:0;}
textarea{flex:1;width:100%;background:var(--bg);border:none;outline:none;resize:none;color:var(--text);font-family:var(--font-mono);font-size:13px;line-height:1.6;padding:14px 18px;caret-color:var(--accent);overflow-y:auto;tab-size:2;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
textarea::selection{background:rgba(91,141,238,.25)}
textarea::-webkit-scrollbar{width:6px}
textarea::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.preview-pane{flex:1;display:flex;flex-direction:column;min-width:0;}
.preview-pane.hidden{flex:0;overflow:hidden}
.preview-header{height:28px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-size:11px;color:var(--text3);letter-spacing:.05em;flex-shrink:0;}
.preview-scroll{flex:1;overflow-y:auto;padding:24px 32px;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.preview-scroll::-webkit-scrollbar{width:6px}
.preview-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.md-body{font-family:var(--font-serif);font-size:15px;line-height:1.9;color:var(--text);max-width:680px;}
.md-body h1,.md-body h2,.md-body h3,.md-body h4{font-weight:600;margin:1.6em 0 .6em;line-height:1.3;}
.md-body h1{font-size:2em;color:#fff;border-bottom:1px solid var(--border);padding-bottom:.4em}
.md-body h2{font-size:1.4em;color:#e0e6f4}
.md-body h3{font-size:1.15em;color:var(--text)}
.md-body p{margin:.8em 0}
.md-body a{color:var(--accent);text-decoration:none}
.md-body a:hover{text-decoration:underline}
.md-body strong{color:#fff;font-weight:600}
.md-body em{font-style:italic}
.md-body blockquote{border-left:3px solid var(--accent2);margin:1em 0;padding:.6em 1em;background:rgba(124,92,191,.08);border-radius:0 var(--radius) var(--radius) 0;color:var(--text2);}
.md-body ul,.md-body ol{margin:.8em 0;padding-left:1.8em}
.md-body li{margin:.3em 0}
.md-body code{font-family:var(--font-mono);font-size:.85em;background:var(--bg3);padding:.15em .4em;border-radius:4px;color:#a9c8ff;border:1px solid var(--border);}
.md-body pre{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:1em 1.2em;overflow-x:auto;margin:1em 0;}
.md-body pre code{background:none;border:none;padding:0;color:#c9d1d9;font-size:.88em;line-height:1.6;}
.md-body table{border-collapse:collapse;width:100%;margin:1em 0;font-size:.9em;}
.md-body th,.md-body td{padding:.5em .9em;border:1px solid var(--border);text-align:left;}
.md-body th{background:var(--bg3);color:var(--text);font-weight:600}
.md-body td{color:var(--text2)}
.md-body hr{border:none;border-top:1px solid var(--border);margin:1.6em 0}
.md-body img{max-width:100%;border-radius:var(--radius);}
.drag-handle{width:4px;background:var(--border);cursor:col-resize;flex-shrink:0;transition:background .15s;}
.drag-handle:hover,.drag-handle.dragging{background:var(--accent)}
</style>
</head>
<body>
<div class="toolbar">
  <span class="toolbar-logo">✦ MD</span>
  <button class="tb-btn" id="btn-open">⊕ 開啟</button>
  <button class="tb-btn" id="btn-save">↓ 儲存</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="fmt-bold"><b>B</b></button>
  <button class="tb-btn" id="fmt-italic"><i>I</i></button>
  <button class="tb-btn" id="fmt-code" style="font-family:monospace">`</button>
  <button class="tb-btn" id="fmt-link">⊞ 連結</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="fmt-h1">H1</button>
  <button class="tb-btn" id="fmt-h2">H2</button>
  <button class="tb-btn" id="fmt-ul">• 列表</button>
  <button class="tb-btn" id="fmt-quote">" 引用</button>
  <div class="tb-sep"></div>
  <button class="tb-btn active" id="view-split">⊟ 分割</button>
  <button class="tb-btn" id="view-editor">✏ 編輯</button>
  <button class="tb-btn" id="view-preview">◉ 預覽</button>
  <div class="tb-spacer"></div>
  <span class="tb-status" id="status-text">就緒</span>
</div>
<div class="tabbar" id="tabbar"></div>
<div class="main" id="main-area">
  <div class="editor-pane" id="editor-pane">
    <div class="editor-header">EDITOR</div>
    <textarea id="editor" spellcheck="false" autocomplete="off"></textarea>
  </div>
  <div class="drag-handle" id="drag-handle"></div>
  <div class="preview-pane" id="preview-pane">
    <div class="preview-header">PREVIEW</div>
    <div class="preview-scroll">
      <div class="md-body" id="preview-body"></div>
    </div>
  </div>
</div>
<script>
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function inline(s){
  s=s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/__(.+?)__/g,'<strong>$1</strong>');
  s=s.replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
  s=s.replace(/_([^_\n]+)_/g,'<em>$1</em>');
  s=s.replace(/~~(.+?)~~/g,'<del>$1</del>');
  s=s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  return s;
}

function parseMarkdown(src){
  const blocks=[];
  let html=src.replace(/```([\w]*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    blocks.push(`<pre><code>${escHtml(code.trim())}</code></pre>`);
    return '\x00B'+(blocks.length-1)+'\x00';
  });
  html=html.replace(/`([^`\n]+)`/g,(_,c)=>{
    blocks.push(`<code>${escHtml(c)}</code>`);
    return '\x00B'+(blocks.length-1)+'\x00';
  });
  const lines=html.split('\n');
  const out=[];let i=0;
  while(i<lines.length){
    const line=lines[i];
    const hm=line.match(/^(#{1,6})\s+(.*)/);
    if(hm){out.push(`<h${hm[1].length}>${inline(hm[2])}</h${hm[1].length}>`);i++;continue;}
    if(/^[-*_]{3,}$/.test(line.trim())){out.push('<hr>');i++;continue;}
    if(line.startsWith('> ')){
      const bq=[];
      while(i<lines.length&&lines[i].startsWith('> ')){bq.push(lines[i].slice(2));i++;}
      out.push(`<blockquote>${parseMarkdown(bq.join('\n'))}</blockquote>`);continue;
    }
    if(/^[-*+]\s/.test(line)){
      const items=[];
      while(i<lines.length&&/^[-*+]\s/.test(lines[i])){items.push(`<li>${inline(lines[i].replace(/^[-*+]\s/,''))}</li>`);i++;}
      out.push(`<ul>${items.join('')}</ul>`);continue;
    }
    if(/^\d+\.\s/.test(line)){
      const items=[];
      while(i<lines.length&&/^\d+\.\s/.test(lines[i])){items.push(`<li>${inline(lines[i].replace(/^\d+\.\s/,''))}</li>`);i++;}
      out.push(`<ol>${items.join('')}</ol>`);continue;
    }
    if(line.includes('|')&&i+1<lines.length&&/^\|?[-| :]+\|?$/.test(lines[i+1].trim())){
      const headers=line.split('|').map(c=>c.trim()).filter(c=>c);
      i+=2;
      const rows=[];
      while(i<lines.length&&lines[i].includes('|')){rows.push(lines[i].split('|').map(c=>c.trim()).filter(c=>c));i++;}
      out.push(`<table><thead><tr>${headers.map(h=>`<th>${inline(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${inline(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`);
      continue;
    }
    if(/^\x00B\d+\x00$/.test(line.trim())){out.push(line.trim());i++;continue;}
    if(line.trim()===''){i++;continue;}
    const pLines=[];
    while(i<lines.length&&lines[i].trim()!==''&&!/^#{1,6}\s/.test(lines[i])&&!/^[-*+]\s/.test(lines[i])&&!/^\d+\.\s/.test(lines[i])&&!lines[i].startsWith('> ')&&!/^[-*_]{3,}$/.test(lines[i].trim())&&!/^\x00B\d+\x00$/.test(lines[i].trim())){
      pLines.push(lines[i]);i++;
    }
    if(pLines.length)out.push(`<p>${inline(pLines.join('<br>'))}</p>`);
  }
  return out.join('\n').replace(/\x00B(\d+)\x00/g,(_,n)=>blocks[+n]);
}

const DEFAULT_MD=`# 歡迎使用 Markdown 編輯器

這是一個支援**即時預覽**的輕量編輯器。

## 功能特色

- ✅ 即時 Markdown 預覽
- ✅ 多分頁編輯
- ✅ 深色主題
- ✅ 工具列快捷操作
- ✅ 檔案開啟 / 儲存

## 程式碼範例

\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}!\`;
}
console.log(greet('World'));
\`\`\`

## 表格

| 語言 | 用途 | 熱門度 |
|------|------|--------|
| TypeScript | 前端 / 後端 | ⭐⭐⭐⭐⭐ |
| Python | AI / 資料 | ⭐⭐⭐⭐⭐ |
| Rust | 系統開發 | ⭐⭐⭐⭐ |

> **提示**：使用上方工具列可快速插入格式。

---

*開始編輯吧！*
`;

let tabs=[{id:1,name:'README.md',content:DEFAULT_MD,modified:false}];
let activeTab=1,nextId=2,isDragging=false,splitRatio=50;
const editor=document.getElementById('editor');
const previewBody=document.getElementById('preview-body');
const tabbar=document.getElementById('tabbar');
const statusText=document.getElementById('status-text');
const editorPane=document.getElementById('editor-pane');
const previewPane=document.getElementById('preview-pane');
const dragHandle=document.getElementById('drag-handle');
const mainArea=document.getElementById('main-area');

function renderPreview(){previewBody.innerHTML=parseMarkdown(editor.value);}

function renderTabs(){
  tabbar.innerHTML='';
  tabs.forEach(t=>{
    const el=document.createElement('button');
    el.className='tab'+(t.id===activeTab?' active':'')+(t.modified?' modified':'');
    el.innerHTML=`<span class="tab-dot"></span><span>${t.name}</span><span class="tab-close" data-id="${t.id}">×</span>`;
    el.addEventListener('click',e=>{if(e.target.dataset.id){closeTab(+e.target.dataset.id);return;}switchTab(t.id);});
    tabbar.appendChild(el);
  });
  const addBtn=document.createElement('button');
  addBtn.className='tab-new';addBtn.textContent='+';addBtn.title='新增分頁';
  addBtn.addEventListener('click',newTab);tabbar.appendChild(addBtn);
}

function switchTab(id){
  const cur=tabs.find(t=>t.id===activeTab);if(cur)cur.content=editor.value;
  activeTab=id;const t=tabs.find(t=>t.id===id);
  if(t){editor.value=t.content;renderPreview();renderTabs();}
}
function newTab(){const t={id:nextId++,name:`Untitled-${nextId-1}.md`,content:'',modified:false};tabs.push(t);switchTab(t.id);}
function closeTab(id){
  if(tabs.length===1){tabs[0].content='';editor.value='';renderPreview();return;}
  const idx=tabs.findIndex(t=>t.id===id);tabs.splice(idx,1);
  if(activeTab===id)switchTab(tabs[Math.min(idx,tabs.length-1)].id);else renderTabs();
}

editor.addEventListener('input',()=>{
  renderPreview();
  const t=tabs.find(t=>t.id===activeTab);if(t){t.modified=true;renderTabs();}
  const w=editor.value.trim()?editor.value.trim().split(/\s+/).length:0;
  statusText.textContent=w+' 字';
});
editor.addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault();const s=editor.selectionStart,en=editor.selectionEnd;editor.value=editor.value.substring(0,s)+'  '+editor.value.substring(en);editor.selectionStart=editor.selectionEnd=s+2;}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveFile();}
  if((e.ctrlKey||e.metaKey)&&e.key==='b'){e.preventDefault();wrap('**','**');}
  if((e.ctrlKey||e.metaKey)&&e.key==='i'){e.preventDefault();wrap('*','*');}
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();wrap('[','](https://)');}
});

function wrap(before,after){
  const s=editor.selectionStart,e=editor.selectionEnd,sel=editor.value.substring(s,e);
  editor.value=editor.value.substring(0,s)+before+sel+after+editor.value.substring(e);
  editor.selectionStart=s+before.length;editor.selectionEnd=s+before.length+sel.length;
  editor.focus();renderPreview();
}
function insertLine(prefix){
  const s=editor.selectionStart,ls=editor.value.lastIndexOf('\n',s-1)+1;
  editor.value=editor.value.substring(0,ls)+prefix+editor.value.substring(ls);
  editor.selectionStart=editor.selectionEnd=s+prefix.length;
  editor.focus();renderPreview();
}

document.getElementById('fmt-bold').addEventListener('click',()=>wrap('**','**'));
document.getElementById('fmt-italic').addEventListener('click',()=>wrap('*','*'));
document.getElementById('fmt-code').addEventListener('click',()=>wrap('`','`'));
document.getElementById('fmt-link').addEventListener('click',()=>wrap('[','](https://)'));
document.getElementById('fmt-h1').addEventListener('click',()=>insertLine('# '));
document.getElementById('fmt-h2').addEventListener('click',()=>insertLine('## '));
document.getElementById('fmt-ul').addEventListener('click',()=>insertLine('- '));
document.getElementById('fmt-quote').addEventListener('click',()=>insertLine('> '));

function setView(mode){
  ['split','editor','preview'].forEach(m=>document.getElementById('view-'+m).classList.toggle('active',m===mode));
  editorPane.classList.toggle('hidden',mode==='preview');
  previewPane.classList.toggle('hidden',mode==='editor');
  dragHandle.style.display=mode==='split'?'':'none';
  if(mode==='split'){editorPane.style.flex=splitRatio+'';previewPane.style.flex=(100-splitRatio)+'';}
  else{editorPane.style.flex='';previewPane.style.flex='';}
}
document.getElementById('view-split').addEventListener('click',()=>setView('split'));
document.getElementById('view-editor').addEventListener('click',()=>setView('editor'));
document.getElementById('view-preview').addEventListener('click',()=>setView('preview'));

dragHandle.addEventListener('mousedown',e=>{isDragging=true;dragHandle.classList.add('dragging');e.preventDefault();});
document.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  const rect=mainArea.getBoundingClientRect();
  splitRatio=Math.min(80,Math.max(20,((e.clientX-rect.left)/rect.width)*100));
  editorPane.style.flex=splitRatio+'';previewPane.style.flex=(100-splitRatio)+'';
});
document.addEventListener('mouseup',()=>{isDragging=false;dragHandle.classList.remove('dragging');});

document.getElementById('btn-open').addEventListener('click',async()=>{
  if(window.showOpenFilePicker){
    try{
      const[fh]=await window.showOpenFilePicker({types:[{description:'Markdown',accept:{'text/markdown':['.md','.markdown','.txt']}}]});
      const file=await fh.getFile();const text=await file.text();
      const t=tabs.find(t=>t.id===activeTab);if(t){t.name=file.name;t.content=text;t.modified=false;}
      editor.value=text;renderPreview();renderTabs();statusText.textContent='已開啟 '+file.name;
    }catch{}
  }else{
    const inp=document.createElement('input');inp.type='file';inp.accept='.md,.markdown,.txt';
    inp.onchange=async()=>{
      const file=inp.files[0];if(!file)return;const text=await file.text();
      const t=tabs.find(t=>t.id===activeTab);if(t){t.name=file.name;t.content=text;t.modified=false;}
      editor.value=text;renderPreview();renderTabs();
    };inp.click();
  }
});

function saveFile(){
  const t=tabs.find(t=>t.id===activeTab);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([editor.value],{type:'text/markdown'}));
  a.download=t?t.name:'document.md';a.click();
  if(t){t.modified=false;renderTabs();}
  statusText.textContent='已儲存 ✓';
  setTimeout(()=>{statusText.textContent=editor.value.trim()?editor.value.trim().split(/\s+/).length+' 字':'就緒';},2000);
}
document.getElementById('btn-save').addEventListener('click',saveFile);

editor.value=DEFAULT_MD;renderPreview();renderTabs();setView('split');
</script>
</body>
</html>
